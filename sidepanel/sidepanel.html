<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overflow</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header class="app-header">
    <span class="logo-mark">≈</span>
    <h1>Overflow</h1>
  </header>

  <section class="panel">
    <label for="prompts">Prompts <span class="hint">one per line</span></label>
    <textarea id="prompts" placeholder="a red bicycle leaning against a brick wall&#10;a cup of coffee on a wooden desk&#10;..."></textarea>

    <div class="file-upload-row">
      <label for="prompt-file" class="file-upload-label">Or upload a .txt file</label>
      <input type="file" id="prompt-file" accept=".txt" class="file-input" />
    </div>

    <div class="row">
      <label>Delay between prompts</label>
      <div class="delay-input">
        <input type="number" id="delay-min" min="1" value="8" />
        <span>to</span>
        <input type="number" id="delay-max" min="1" value="20" />
        <span>sec</span>
      </div>
    </div>

    <div class="row">
      <label for="auto-download">Auto-download results</label>
      <input type="checkbox" id="auto-download" class="toggle-checkbox" />
    </div>

    <div class="folder-field">
      <label for="download-folder">Download folder <span class="hint">optional subfolder in Downloads</span></label>
      <input type="text" id="download-folder" placeholder="overflow-batch-1" />
    </div>

    <div class="controls">
      <button id="start" class="primary">Start queue</button>
      <button id="pause" class="secondary" disabled>Pause</button>
      <button id="stop" class="secondary" disabled>Stop</button>
    </div>
  </section>

  <section class="panel queue-panel">
    <div class="queue-header">
      <h2>Queue</h2>
      <span id="queue-progress" class="hint">0 / 0</span>
    </div>
    <ul id="queue-list"></ul>
  </section>

  <footer class="status-bar">
    <span id="status-dot" class="dot idle"></span>
    <span id="status-text">Idle — open a Flow project tab to begin</span>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
