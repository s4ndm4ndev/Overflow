<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overflow</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <header class="app-header">
    <span class="logo-mark">≈</span>
    <h1>Overflow</h1>
  </header>

  <section class="panel">
    <label for="prompts">Prompts <span class="hint">one per line</span></label>
    <textarea id="prompts" placeholder="a red bicycle leaning against a brick wall&#10;a cup of coffee on a wooden desk&#10;..."></textarea>

    <div class="row">
      <label for="delay">Delay between prompts</label>
      <div class="delay-input">
        <input type="number" id="delay" min="1" value="15" />
        <span>sec</span>
      </div>
    </div>

    <div class="controls">
      <button id="start" class="primary">Start queue</button>
      <button id="pause" class="secondary" disabled>Pause</button>
      <button id="stop" class="secondary" disabled>Stop</button>
    </div>
  </section>

  <section class="panel queue-panel">
    <div class="queue-header">
      <h2>Queue</h2>
      <span id="queue-progress" class="hint">0 / 0</span>
    </div>
    <ul id="queue-list"></ul>
  </section>

  <footer class="status-bar">
    <span id="status-dot" class="dot idle"></span>
    <span id="status-text">Idle — open a Flow project tab to begin</span>
  </footer>

  <script src="sidepanel.js"></script>
</body>
</html>
